name: Publish to Nexus Mods

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        default: "0.95"
      file_group_id:
        description: Optional Nexus Mods file group ID. If blank, the NEXUSMODS_FILE_GROUP_ID secret is used.
        required: false
        default: ""
      release_asset_name:
        description: GitHub release asset to publish
        required: true
        default: "Hey-Listen-0.95.zip"
      display_name:
        description: Nexus file display name. Include the version, for example Hey Listen 0.95.
        required: false
        default: "Hey Listen 0.95"
      description:
        description: Nexus file description
        required: false
        default: "Vortex-ready Hey, listen! release."
      file_category:
        description: Nexus file category
        required: false
        default: "main"
      mod_id:
        description: Nexus Mods page mod ID, used to verify the mod-manager download link
        required: false
        default: "697"
      archive_existing_file:
        description: Archive the existing file in this group
        required: false
        default: "false"
      primary_mod_manager_download:
        description: Make this file the default download for mod managers
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  publish:
    name: Upload GitHub release asset to Nexus Mods
    runs-on: ubuntu-latest
    env:
      NEXUS_FILE_GROUP_ID: ${{ inputs.file_group_id || secrets.NEXUSMODS_FILE_GROUP_ID }}

    steps:
      - name: Checkout upload helper
        uses: actions/checkout@v4

      - name: Validate Nexus file group
        run: test -n "$NEXUS_FILE_GROUP_ID"

      - name: Download GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          RELEASE_ASSET_NAME: ${{ inputs.release_asset_name }}
        run: |
          mkdir -p dist
          gh release download "v${VERSION}" --pattern "${RELEASE_ASSET_NAME}" --dir dist --repo "${GITHUB_REPOSITORY}"
          test -f "dist/${RELEASE_ASSET_NAME}"

      - name: Upload to Nexus Mods
        env:
          NEXUSMODS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
          NEXUS_FILE_GROUP_ID: ${{ env.NEXUS_FILE_GROUP_ID }}
          NEXUS_UPLOAD_FILENAME: "dist/${{ inputs.release_asset_name }}"
          NEXUS_UPLOAD_VERSION: "${{ inputs.version }}"
          NEXUS_UPLOAD_DISPLAY_NAME: "${{ inputs.display_name }}"
          NEXUS_UPLOAD_DESCRIPTION: "${{ inputs.description }}"
          NEXUS_UPLOAD_FILE_CATEGORY: "${{ inputs.file_category }}"
          NEXUS_ARCHIVE_EXISTING_FILE: ${{ inputs.archive_existing_file }}
          NEXUS_PRIMARY_MOD_MANAGER_DOWNLOAD: ${{ inputs.primary_mod_manager_download }}
          NEXUS_ALLOW_MOD_MANAGER_DOWNLOAD: "true"
          NEXUS_SHOW_REQUIREMENTS_POP_UP: "false"
          NEXUS_VERIFY_MOD_MANAGER_DOWNLOAD: "true"
          NEXUS_GAME_DOMAIN: "slaythespire2"
          NEXUS_MOD_ID: "${{ inputs.mod_id }}"
        run: node scripts/upload-nexus-file.mjs
